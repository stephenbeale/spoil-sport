<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spoil Sport — Promo Tile (440x280)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 440px;
      height: 280px;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 16px;
      border: 2px solid rgba(255,255,255,0.15);
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #b0c4de;
      max-width: 320px;
      line-height: 1.4;
    }
    .badge {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #4caf50;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }
    .badge::before {
      content: "\2714";
    }
  </style>
</head>
<body>
  <div class="icon">&#128683;</div>
  <h1>Spoil Sport</h1>
  <p>Hide sports spoilers from your YouTube feed</p>
  <span class="badge">Free &amp; Open Source</span>
</body>
</html>
