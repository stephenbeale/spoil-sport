<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      max-width: 480px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; color: #fff; }
    p { font-size: 13px; color: #999; margin-bottom: 12px; }
    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .keyword-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #2a2a4a;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 13px;
    }
    .keyword-tag button {
      background: none;
      border: none;
      color: #ff6666;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
    }
    .keyword-tag button:hover { color: #ff3333; }
    .keyword-tag button:focus-visible { outline: 2px solid #80b0ff; outline-offset: 1px; }
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    input[type="text"] {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #222;
      color: #e0e0e0;
      font-size: 13px;
    }
    input[type="text"]:focus { outline: 2px solid #80b0ff; border-color: transparent; }
    button.add-btn, button.reset-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button.add-btn {
      background: #4caf50;
      color: #fff;
    }
    button.add-btn:hover { background: #45a049; }
    button.add-btn:focus-visible { outline: 2px solid #80b0ff; outline-offset: 2px; }
    button.reset-btn {
      background: #555;
      color: #ccc;
      margin-top: 4px;
    }
    button.reset-btn:hover { background: #666; }
    button.reset-btn:focus-visible { outline: 2px solid #80b0ff; outline-offset: 2px; }
    #status {
      font-size: 12px;
      color: #4caf50;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>Spoil Sport - Blocked Keywords</h1>
  <p>Videos whose titles match any of these keywords will have their thumbnails hidden and titles replaced.</p>
  <div class="keyword-list" id="keyword-list" role="list" aria-label="Blocked keywords"></div>
  <div class="add-row">
    <label for="new-keyword" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Add keyword</label>
    <input type="text" id="new-keyword" placeholder="Add a keyword..." aria-label="Add keyword">
    <button class="add-btn" id="add-btn">Add</button>
  </div>
  <button class="reset-btn" id="reset-btn">Reset to defaults</button>
  <div id="status" aria-live="polite"></div>
  <script src="options.js"></script>
</body>
</html>
