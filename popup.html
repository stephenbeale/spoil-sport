<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #fff;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-row label { font-size: 14px; }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider { background: #4caf50; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .switch input:focus-visible + .slider { outline: 2px solid #80b0ff; outline-offset: 2px; }
    .stats {
      font-size: 12px;
      color: #888;
      border-top: 1px solid #333;
      padding-top: 10px;
      margin-top: 4px;
    }
    .options-link {
      display: block;
      margin-top: 10px;
      color: #80b0ff;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
    }
    .options-link:hover { text-decoration: underline; }
    .options-link:focus-visible { outline: 2px solid #80b0ff; outline-offset: 2px; }
  </style>
</head>
<body>
  <h1>Spoil Sport</h1>
  <div class="toggle-row">
    <label for="enabled">Enabled</label>
    <div class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider" role="presentation"></span>
    </div>
  </div>
  <div class="stats" id="stats" aria-live="polite">Watching for spoilers...</div>
  <a class="options-link" id="options-link" href="#">Manage blocked sports</a>
  <script src="popup.js"></script>
</body>
</html>
